# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER
$term = foot
# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, RETURN, exec, $term
bind = $mainMod SHIFT, RETURN, exec, thunar
bind = $mainMod SHIFT, C, killactive, 
#bind = $mainMod SHIFT, Q, exit, 
bind = $mainMod SHIFT, Q, exec, ~/.local/bin/logout-script
bind = $mainMod, S, exec, grimshot save area
bind = $mainMod SHIFT, S, exec, grimshot save output
#bind = $mainMod SHIFT, M, exec, $term -e cmus
bind = $mainMod SHIFT, M, exec, ~/.local/bin/cmus-control
bind = $mainMod SHIFT, B, exec, ~/.local/bin/btctrl
#bind = $mainMod, E, exec, emacsclient -c -a 'emacs'
bind = $mainMod SHIFT, E, exec, $term -e nvim
#bind = $mainMod, W, exec, MOZ_ENABLE_WAYLAND=1 firefox
#bind = $mainMod, W, exec, floorp-ablaze
#bind = $mainMod, W, exec, flatpak run one.ablaze.floorp
#bind = $mainMod, W, exec, one.ablaze.floorp
#bind = $mainMod, W, exec, qutebrowser
#bind = $mainMod, W, exec, brave --enable-features=UseOzonePlatform --ozone-platform=wayland 
#bind = $mainMod, W, exec, vivaldi-stable --enable-features=UseOzonePlatform --ozone-platform=wayland 
bind = $mainMod, W, exec, flatpak run com.vivaldi.Vivaldi --enable-features=UseOzonePlatform --ozone-platform=wayland 
#bind = $mainMod SHIFT, W, exec, flatpak run com.vivaldi.Vivaldi --enable-features=UseOzonePlatform --ozone-platform=wayland 
#bind = $mainMod, W, exec, ~/.local/bin/browsermenu
#bind = $mainMod SHIFT, W, exec, qutebrowser
bind = $mainMod, slash, exec, hyprctl dispatch pin active
# Change kb layout
bind = $mainMod SHIFT, SPACE, exec, hyprctl switchxkblayout at-translated-set-2-keyboard next
# Key Chords For Emacs
bind = SUPER, E, submap, emacskeys
submap = emacskeys
bind = ,A,exec, emacsclient -c -e '(emms)'
bind = ,A,submap,reset
bind = ,D,exec, emacsclient -c -e '(dired)'
bind = ,D,submap,reset
bind = ,E,exec, emacsclient -c -a 'emacs'
bind = ,E,submap,reset
bind = ,F,exec, emacsclient -c -e '(elfeed)'
bind = ,F,submap,reset
#bind = ,R,exec, emacsclient -c -e '(counsel-run-launcher)'
#bind = ,R,submap,reset
#bind = ,T,exec, emacsclient -c -e '(tldr)'
#bind = ,T,submap,reset
#bind = ,A,exec, emacsclient -c -e '(emms)'
#bind = ,A,submap,reset

bind = ,escape,submap,reset
submap = reset

bind = $mainMod, V, exec, setrandom $HOME/wallpapers
#bind = $mainMod, Z, exec, [workspace 7;] kitty -e newsboat
bind = $mainMod, M, fullscreen, 1
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, togglefloating,  

#bind = $mainMod, P, exec, wofi --show drun
#bind = $mainMod, P, exec, j4-dmenu-desktop --dmenu="bemenu --hb '##467b96' --hf '##dfdfdf' --tb '##467b96' --tf '##dfdfdf' -H 29 --ch 18 --cw 1 --fixed-height --auto-select --fn 'Hack' -p 'Desktop Run: ' -i -w --fork" --term=kitty --usage-log=$HOME/.local/share/j4-dmenu-desktop.log --no-generic
#bind = $mainMod, R, exec, bemenu-run --hb '##467b96' --hf '##dfdfdf' --tb '##467b96' --tf '##dfdfdf' -H 29 --ch 18 --cw 1 --fixed-height --auto-select --fn 'Hack' -p 'Run Application: '
bind = $mainMod, R, exec, ~/.local/bin/my-bemenu -r
bind = $mainMod, P, exec, ~/.local/bin/my-bemenu -d
