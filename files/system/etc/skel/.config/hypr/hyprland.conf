# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = gb,bg
    kb_variant = ,phonetic
    kb_model =
    kb_options =
    kb_rules =
    #repeat_rate = 65
    #repeat_delay = 300

    follow_mouse = 1

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0.0 # -1.0 - 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in =  5
    gaps_out =  8
    border_size = 2
    # col.active_border = rgb(7fbbb3) rgb(e67e80) 45deg
    col.active_border = rgb(467b96)
    #col.active_border = rgb(51afef)
    col.inactive_border = rgb(889fa7)
    #col.active_border = rgb(474f54)
    #col.inactive_border = rgba(59595900)
    #col.inactive_border = rgba(373d4100)

    layout = master
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 5
    blur {
    enabled = false
    }

    drop_shadow = no
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
}

animations {
    enabled = no

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier=overshot,0.05,0.9,0.1,1.1
    animation = windows, 1, 4, overshot,slide
    animation = windowsOut, 1, 2, default, popin 80%
    #animation = border, 1, 10, default
    #animation = fade, 1, 10, default
    animation = workspaces, 1, 3, overshot, slide
}

misc {
    disable_hyprland_logo = true
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    #new_is_master = false
    new_on_top = false
    mfact = 0.5
    # no_gaps_when_only = true
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    workspace_swipe = off
}

