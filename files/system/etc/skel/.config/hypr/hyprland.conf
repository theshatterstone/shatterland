#bind = ALT, C, exec, eww open --toggle controlcenter
#bind = ALT, F, exec, eww open --toggle fzf
#bind = ALT, E, exec, killall eww
bind = $mainMod, D, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
#binde = ,XF86MonBrightnessUp, exec, brightnessctl set 1%+
#binde = ,XF86MonBrightnessDown, exec, brightnessctl set 1%-
binde = ,XF86MonBrightnessUp, exec, ~/.local/bin/blctrl set +5
binde = ,XF86MonBrightnessDown, exec, ~/.local/bin/blctrl set -5
binde = ,XF86AudioMute, exec, amixer set Master toggle
#binde = ,XF86AudioLowerVolume, exec, amixer set Master 5%-
#binde = ,XF86AudioRaiseVolume, exec, amixer set Master 5%+
binde = ,XF86AudioLowerVolume, exec, ~/.local/bin/volctrl set -5
binde = ,XF86AudioRaiseVolume, exec, ~/.local/bin/volctrl set +5
#binde = ,XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
bind = ,Print, exec, screenshot s
bind = $mainMod, Print, exec, screenshot r
binde= $mainMod ,l,resizeactive,10 0
binde= $mainMod ,h,resizeactive,-10 0

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
#bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
#bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# Move active workspace to a monitor 
bind = $mainMod CTRL, 1, focusmonitor, eDP-1
bind = $mainMod CTRL, 2, focusmonitor, HDMI-A-1
#focus specified monitor. Not used
#bind = $mainMod CTRL, 3, moveworkspacetomonitor, 3
#bind = $mainMod CTRL, 4, moveworkspacetomonitor, 4
#bind = $mainMod CTRL, 5, moveworkspacetomonitor, 5
#bind = $mainMod CTRL, 6, moveworkspacetomonitor, 6
#bind = $mainMod CTRL, 7, moveworkspacetomonitor, 7
#bind = $mainMod CTRL, 8, moveworkspacetomonitor, 8
#bind = $mainMod CTRL, 9, moveworkspacetomonitor, 9
#bind = $mainMod CTRL, 0, moveworkspacetomonitor, 0

bind = $mainMod, k, layoutmsg, cycleprev
bind = $mainMod, j, layoutmsg, cyclenext
bind = $mainMod SHIFT, k, layoutmsg, swapprev
bind = $mainMod SHIFT, j, layoutmsg, swapnext
bind = $mainMod, SPACE, layoutmsg, swapwithmaster

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once=dbus-launch --autolaunch=$(cat /var/lib/dbus/machine-id)
