[colors]
background = #282c34
background-alt = #1c1f24
foreground = #dfdfdf
ws-underline= #51afef
primary = #51afef
secondary = #889fa7
alert = #A54242
ws-hidden = #707880
disabled = #707880
wincolor = #51afef

[bar/bspwm]
width = 100%
height = 20pt
radius = 0

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt

border-size = 0pt
border-color = #00000000

padding-left = 0
padding-right = 0

module-margin = 1.0

separator = |
separator-foreground = ${colors.disabled}

tray-position = right
#tray-detached = false
#tray-maxsize = 8 


font-0 = Ubuntu:size=11.0:weight=bold;2

modules-left = xworkspaces xwindow
modules-right = backlight cpu battery alsa temperature memory date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; tray-position = right

; wm-restack = generic
wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[bar/dwm]
width = 100%
height = 20pt
radius = 0

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt

border-size = 0pt
border-color = #00000000

padding-left = 0
padding-right = 0

module-margin = 1.0

separator = |
separator-foreground = ${colors.disabled}

tray-position = right
tray-detached = false
tray-maxsize = 8 


font-0 = Ubuntu:size=11.0:weight=bold;2

modules-left = xworkspaces xwindow
; modules-left = workspaces-xmonad title-xmonad
modules-right = backlight cpu battery alsa temperature memory date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; tray-position = right

wm-restack = generic
;wm-restack = bspwm
; wm-restack = i3

; override-redirect = true



[bar/xmonad]
width = 100%
height = 20pt
radius = 0

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt

border-size = 0pt
border-color = #00000000

padding-left = 0
padding-right = 0

module-margin = 1.0

separator = |
separator-foreground = ${colors.disabled}

tray-position = right
tray-detached = false
tray-maxsize = 8 


font-0 = Ubuntu:size=11.0:weight=bold;2

modules-left = xworkspaces xwindow
; modules-left = workspaces-xmonad title-xmonad
modules-right = backlight cpu battery alsa temperature memory date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; tray-position = right

wm-restack = generic
;wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/workspaces-xmonad]
type = custom/script
exec = tail -F /tmp/.xmonad-workspace-log
exec-if = [ -p /tmp/.xmonad-workspace-log ]
tail = true

[module/title-xmonad]
type = custom/script
exec = tail -F /tmp/.xmonad-title-log
exec-if = [ -p /tmp/.xmonad-title-log ]
tail = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.ws-underline}
label-active-padding = 2

label-occupied = %name%
label-occupied-padding = 2

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

label-empty = %name%
label-empty-foreground = ${colors.ws-hidden}
label-empty-padding = 2

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%
format-foreground = ${colors.wincolor} 
format-padding = 1
label-maxlen = 50

[module/backlight]
type = internal/backlight
card = amdgpu_bl0
label = Brightness: %percentage%%
label-foreground = #ff6c6b

[module/cpu]
type = internal/cpu
interval = 2
format-prefix-foreground = ${colors.primary}
label = CPU: %percentage:2%%
label-foreground = #98be65

[module/battery]
type = internal/battery
full-at = 99
low-at = 5
battery = BAT1
poll-interval = 5
label-charging = Battery: %percentage%% Charging
label-discharging = Battery: %percentage%%
label-full = Battery: Full
label-charging-foreground = #009E60
label-discharging-foreground = #ecbe7b
label-full-foreground = #ecbe7b

[module/alsa]
type = internal/alsa
master-soundcard = default
speaker-soundcard = default
headphone-soundcard = default
master-mixer = Master
interval = 5
label-volume = Vol: %percentage%%
label-muted = Vol: M
label-volume-foreground = #51afef
label-muted-foreground = #51afef

[module/temperature]
type = internal/temperature
interval = 1.0
thermal-zone = 0
#hwmon-path = /sys/devices/platform/coretemp.0/hwmon/hwmon2/temp1_input
#hwmon-path = /sys/devices/pci0000:00/0000:00:02.1/0000:04:00.0/hwmon/hwmon6/temp1_input
hwmon-path = /sys/devices/pci0000:00/0000:00:02.1/0000:04:00.0/hwmon/hwmon5/temp1_input
label = Temp: %temperature-c%
label-foreground = #da8548

[module/memory]
type = internal/memory
interval = 2
#label = Mem: %mb_used%Mb/%mb_free%Mb
label = Mem: %mb_used%
label-foreground = #c678dd

[module/date]
type = internal/date
interval = 1
date= %A, %d %B %Y
time = %H:%M
label = %date% %time%
label-foreground = #46d9ff

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
