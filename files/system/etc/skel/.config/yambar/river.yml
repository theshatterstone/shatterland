colour3: &colour3 51afefff

# This is THE bar configuration
bar:
  height: 24
  location: top
  spacing: 5
  margin: 2

  # Default font
  font: Adobe Helvetica:pixelsize=12

  foreground: ffffffff
  background: 282c34ff

  # border:
