        # number-of-tags: 9
        # name-of-tags: [1, 2, 3, 4, 5, 6, 7, 8, 9]
        title: {string: { text: " {title} ", font: *ubuntu_small, foreground: *colour3}}
        content:
          list:
            items:
              - map:
                  conditions:
                    # This defines the active tag, the currently selected one
                    focused: {string: {text: "   {id}   ", foreground: "dfdfdfff",font: *ubuntu_small, deco: {underline: { size: 2, color: 51afefff}}}}
                    # This turns tag 0 into showing the window title, meaning that instead of showing tag 0, it will show the current window title
                    id > 9: {string: {text: "", foreground: *colour3, font: *ubuntu_small}}
                    # the configuration for tags that are occupied
                    occupied: {string: {text: "   {id}   ", foreground: "dfdfdfff", font: *ubuntu_small}}
                    # This is the configuration for non-occupied tags
                    ~occupied: {string: {text: "   {id}   ", foreground: "696969ff", font: *ubuntu_small}}
