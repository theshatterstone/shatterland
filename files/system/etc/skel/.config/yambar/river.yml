    - backlight:
        name: amdgpu_bl0
        content: [ string: {text: "Brightness: {percent}%",foreground: *colour1, font: *ubuntu, deco: {underline: { size: 2, color: *colour1}}}]
    - cpu:
        poll-interval: 2500
        content:
          map:
            conditions:
              id < 0:
                - string: {text: "CPU: {cpu}%", foreground: *colour2, font: *ubuntu, deco: {underline: { size: 2, color: *colour2}}}
    - battery:
        name: BAT1
        poll-interval: 30000
        anchors:
          discharging: &discharging
            list:
              items:
                - string: {text: "Battery: {capacity}%", foreground: *colour1, font: *ubuntu, deco: {underline: { size: 2, color: *colour1}}}
        content:
          map:
            conditions:
              state == unknown:
                <<: *discharging
              state == discharging:
                <<: *discharging
              state == charging:
                - string: {text: "Battery: {capacity}% Charging", foreground: *colour1, font: *ubuntu, deco: {underline: { size: 2, color: *colour1}}}
              state == full:
                - string: {text: "Battery: {capacity}% Full", foreground: *colour1, font: *ubuntu, deco: {underline: { size: 2, color: *colour1}}}
              state == "not charging":
                - string: {text: "Battery: {capacity}% Plugged", foreground: *colour1, font: *ubuntu, deco: {underline: { size: 2, color: *colour1}}}
    - alsa:
        card: default
        mixer: Master
        content:
          map:
            conditions:
              ~online: {string: {text: "Vol: Error", foreground: *colour2, font: *ubuntu, deco: {underline: { size: 2, color: *colour2}}}}
              online:
                map:
                  default: {string: {text: "Vol: {percent}%", foreground: *colour2, font: *ubuntu, deco: {underline: { size: 2, color: *colour2}}}}
                  conditions:
                    muted: {string: {text: "Vol: M", foreground: *colour2, font: *ubuntu, deco: {underline: { size: 2, color: *colour2}}}}
    - script:
        path: /home/shatterstone/.config/yambar/cputemp-script-yambar.sh
        args: []
        content: [ string: {text: " Temp: {temp}",foreground: *colour1, font: *ubuntu, deco: {underline: { size: 2, color: *colour1}}}]
    - mem:
        #interval: 2500
        content:
          string: {text: "Mem: {used:mb}Mb/{total:mb}Mb", foreground: *colour2, font: *ubuntu, deco: {underline: { size: 2, color: *colour2}}}
    - clock:
        time-format: "%a, %d %b %Y %H:%M"
        content:
          - string: {text: "{time}", foreground: *colour1, font: *ubuntu, deco: {underline: { size: 2, color: *colour1}}}
          # - string: {text: "{time}", foreground: 00ff00ff, font: *ubuntu, deco: {underline: { size: 2, color: ff0000ff}}}
